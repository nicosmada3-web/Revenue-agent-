<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Coach Dashboard — Solihull School Rugby</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --maroon:#6B1A2B;--maroon-l:#8B2236;--maroon-d:#4A1020;
  --navy:#0D1B2A;--navy-m:#1A2E45;--navy-l:#243850;
  --gold:#C9A84C;--white:#F5F1EB;--grey:#8A9BAE;--green:#2D6A4F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,var(--maroon-d) 0%,var(--navy) 55%);}
.login-card{width:100%;max-width:380px;background:var(--navy-m);border:1px solid var(--navy-l);border-radius:14px;padding:32px 24px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.badge{width:60px;height:60px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:'Bebas Neue';font-size:22px;color:var(--navy);}
.login-card h2{font-size:28px;text-align:center;margin-bottom:2px;}
.login-card .sub{text-align:center;color:var(--gold);font-family:'Barlow Condensed';font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px;}
.field label{display:block;font-family:'Barlow Condensed';font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.field{margin-bottom:16px;}
.field input{width:100%;padding:13px 14px;border-radius:8px;border:1px solid var(--navy-l);background:#0D1B2A;color:var(--white);font-size:16px;font-family:'Barlow',sans-serif;outline:none;}
.field input:focus{border-color:var(--gold);}
.login-btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(180deg,var(--maroon-l),var(--maroon-d));color:var(--white);font-family:'Bebas Neue';font-size:20px;letter-spacing:.08em;}
.err{color:#f87171;font-family:'Barlow Condensed';font-size:12px;text-align:center;margin-top:12px;display:none;}

/* APP SHELL */
.app-header{background:linear-gradient(135deg,var(--maroon-d),var(--navy) 60%);padding:14px 18px;border-bottom:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.app-header .hbadge{width:40px;height:40px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:var(--navy);flex:0 0 auto;}
.app-header h1{font-size:clamp(16px,4vw,24px);line-height:1;}
.app-header .sub2{color:var(--gold);font-family:'Barlow Condensed';font-size:10px;letter-spacing:.12em;text-transform:uppercase;}
.app-header .hactions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-sm{background:none;border:1px solid var(--navy-l);color:var(--grey);padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed';font-size:11px;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold);}

.data-bar{background:rgba(255,255,255,.03);border-bottom:1px solid var(--navy-l);padding:7px 18px;font-family:'Barlow Condensed';font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center;}
.live{color:#34d399;}
.stale{color:var(--gold);}

/* LIST VIEW */
#listView{display:none;}
main{max-width:860px;margin:0 auto;padding:20px 14px 80px;}

.squad-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.squad-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--navy-l);background:none;color:var(--grey);font-family:'Barlow Condensed';font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .15s;}
.squad-btn.active,.squad-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08);}

.player-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s,transform .1s;margin-bottom:10px;}
.player-card:hover{border-color:var(--gold);transform:translateY(-1px);}
.player-card:active{transform:translateY(0);}
.p-avatar{width:48px;height:48px;background:linear-gradient(135deg,var(--maroon-l),var(--maroon-d));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;color:var(--gold);flex:0 0 auto;}
.p-name{font-family:'Bebas Neue';font-size:20px;line-height:1;}
.p-squad{font-family:'Barlow Condensed';font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-top:3px;}
.p-meta{margin-left:auto;text-align:right;}
.p-meta .ex-count{font-family:'Bebas Neue';font-size:22px;color:var(--white);line-height:1;}
.p-meta .ex-label{font-family:'Barlow Condensed';font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);}
.p-meta .p-date{font-family:'Barlow Condensed';font-size:10px;color:var(--grey);text-transform:uppercase;margin-top:4px;}
.p-chevron{color:var(--grey);font-size:18px;margin-left:8px;flex:0 0 auto;}
.empty{text-align:center;padding:48px 20px;color:var(--grey);font-family:'Barlow Condensed';font-size:13px;text-transform:uppercase;letter-spacing:.1em;}

/* PROFILE VIEW */
#profileView{display:none;}
.profile-header{background:linear-gradient(135deg,var(--maroon-d),var(--navy-m) 70%);padding:0;border-bottom:1px solid rgba(201,168,76,0.3);}
.profile-back{display:flex;align-items:center;gap:8px;padding:12px 18px 0;cursor:pointer;border:none;background:none;color:var(--gold);font-family:'Barlow Condensed';font-size:12px;text-transform:uppercase;letter-spacing:.1em;}
.profile-back:hover{color:var(--white);}
.profile-hero{display:flex;align-items:center;gap:16px;padding:14px 18px 18px;}
.profile-avatar{width:64px;height:64px;background:linear-gradient(135deg,var(--maroon-l),var(--maroon-d));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:26px;color:var(--gold);flex:0 0 auto;border:2px solid rgba(201,168,76,.3);}
.profile-name{font-family:'Bebas Neue';font-size:clamp(24px,6vw,36px);line-height:1;}
.profile-squad{font-family:'Barlow Condensed';font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--gold);margin-top:4px;}
.profile-stats{display:flex;gap:20px;margin-top:8px;}
.stat-item{text-align:center;}
.stat-num{font-family:'Bebas Neue';font-size:22px;color:var(--white);line-height:1;}
.stat-lbl{font-family:'Barlow Condensed';font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);}

profile-body{display:block;}
.profile-main{max-width:860px;margin:0 auto;padding:20px 14px 80px;}
.ex-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.ex-card-header{padding:14px 16px 10px;border-bottom:1px solid var(--navy-l);}
.ex-card-name{font-family:'Bebas Neue';font-size:20px;letter-spacing:.05em;line-height:1;}
.ex-card-count{font-family:'Barlow Condensed';font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);margin-top:2px;}
.sessions-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.session-row{background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;}
.session-date{font-family:'Barlow Condensed';font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.sets-row{display:flex;flex-wrap:wrap;gap:6px;}
.set-chip{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:5px 10px;font-family:'Barlow Condensed';font-size:13px;color:var(--white);}
.set-chip .reps{color:var(--grey);font-size:11px;margin-left:2px;}
.cardio-chip{background:rgba(45,106,79,.2);border:1px solid rgba(45,106,79,.4);border-radius:6px;padding:5px 10px;font-family:'Barlow Condensed';font-size:12px;color:#6ee7b7;}
.best-tag{font-family:'Barlow Condensed';font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-top:6px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <div class="badge">S</div>
    <h2>Coach Dashboard</h2>
    <p class="sub">Solihull School Rugby</p>
    <div class="field">
      <label for="pw">Coach password</label>
      <input id="pw" type="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button class="login-btn" id="loginBtn">View Dashboard →</button>
    <p class="err" id="loginErr">Wrong password — try again.</p>
  </div>
</div>

<!-- LIST VIEW -->
<div id="listView">
  <header class="app-header">
    <div class="hbadge">S</div>
    <div><h1>Coach Dashboard</h1><div class="sub2">Solihull School Rugby</div></div>
    <div class="hactions">
      <button class="btn-sm" id="refreshBtn" onclick="doRefresh()">Refresh</button>
      <button class="btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </header>
  <div class="data-bar">
    <span id="dataStatus">Loading…</span>
    <span id="dataCount"></span>
  </div>
  <main>
    <div class="squad-filter" id="squadFilter"></div>
    <div id="playerList"></div>
  </main>
</div>

<!-- PROFILE VIEW -->
<div id="profileView">
  <div class="profile-header">
    <button class="profile-back" onclick="showList()">← Back to squad</button>
    <div class="profile-hero">
      <div class="profile-avatar" id="pAvatar"></div>
      <div>
        <div class="profile-name" id="pName"></div>
        <div class="profile-squad" id="pSquad"></div>
        <div class="profile-stats" id="pStats"></div>
      </div>
    </div>
  </div>
  <div class="profile-main" id="pBody"></div>
</div>

<script>
const PW_HASH = 'a6b1d149f002e8832e2816da470bc902d5488db132bd6d24608a1b8e67efe6d0';
const FORM_ID = '6a3303e2e9512500079738d7';
const TOKEN   = 'nfp_WYpKqiU89Ts3J3gBt3hnRqYwKyS6mukvcb00';

const STATIC = [
  {student:{name:"Simeon Hughes",squad:"2nd XV"},lastSeen:"2026-06-26T19:52:15.007Z",logs:{"Back Squat":[{date:"26 Jun 26",sets:[{weight:"40",reps:"8"},{weight:"40",reps:"8"},{weight:"40",reps:"8"}]}],"Romanian Deadlift":[{date:"26 Jun 26",sets:[{weight:"40",reps:"8"},{weight:"40",reps:"8"},{weight:"40",reps:"8"}]}],"Nordic Hamstring Curl":[{date:"26 Jun 26",sets:[{weight:"0",reps:"6"}]}],"Leg Press":[{date:"26 Jun 26",sets:[{weight:"25",reps:"12"}]}]}},
  {student:{name:"Patrick O'Brien",squad:"U15"},lastSeen:"2026-06-23T21:16:16.489Z",logs:{"Bench Press":[{date:"23 Jun 26",sets:[{weight:"50",reps:"10"},{weight:"60",reps:"5"},{weight:"60",reps:"5"},{weight:"70",reps:"3"}]}],"Bent-Over Row":[{date:"23 Jun 26",sets:[{weight:"60",reps:"8"},{weight:"60",reps:"8"},{weight:"60",reps:"8"},{weight:"60",reps:"5"}]}],"Incline DB Press":[{date:"23 Jun 26",sets:[{weight:"27.5",reps:"7"},{weight:"27.5",reps:"7"},{weight:"27.5",reps:"5"}]}]}},
  {student:{name:"Tom C",squad:"Development"},lastSeen:"2026-06-23T11:16:25.687Z",logs:{"Bench Press":[{date:"23 Jun 26",sets:[{weight:"70",reps:"6"}]}]}},
  {student:{name:"Tom Frost",squad:"U16A"},lastSeen:"2026-06-22T18:31:27.449Z",logs:{"Bench Press":[{date:"22 Jun 26",sets:[{weight:"30",reps:"12"},{weight:"35",reps:"12"},{weight:"35",reps:"12"},{weight:"35",reps:"12"}]}],"Incline DB Press":[{date:"22 Jun 26",sets:[{weight:"14",reps:"15"},{weight:"14",reps:"15"},{weight:"14",reps:"15"}]}]}},
  {student:{name:"Matty Gardner",squad:"1st XV"},lastSeen:"2026-06-22T12:15:45.753Z",logs:{"Bench Press":[{date:"22 Jun 26",sets:[{weight:"60",reps:"12"},{weight:"80",reps:"6"},{weight:"80",reps:"6"}]}],"Incline DB Press":[{date:"22 Jun 26",sets:[{weight:"24",reps:"8"},{weight:"24",reps:"7"},{weight:"24",reps:"7"}]}]}}
];

let allStudents = [];
let currentSquad = 'all';

async function sha256(msg) {
  const buf = new TextEncoder().encode(msg);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
document.getElementById('loginBtn').addEventListener('click', login);

async function login() {
  const pw = document.getElementById('pw').value.trim();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Checking…';
  if (await sha256(pw) !== PW_HASH) {
    document.getElementById('loginErr').style.display = 'block';
    btn.textContent = 'View Dashboard →';
    return;
  }
  document.getElementById('loginWrap').style.display = 'none';
  showList();
  doRefresh();
}

function logout() {
  document.getElementById('listView').style.display = 'none';
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('pw').value = '';
}

function showList() {
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('listView').style.display = 'block';
}

async function doRefresh() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('dataStatus').textContent = 'Refreshing…';
  const btn = document.getElementById('refreshBtn');
  btn.textContent = 'Loading…'; btn.disabled = true;
  const live = await fetchLive();
  if (live) {
    allStudents = live;
    document.getElementById('dataStatus').innerHTML = '<span class="live">● Live data</span>';
  } else {
    allStudents = STATIC;
    document.getElementById('dataStatus').innerHTML = '<span class="stale">● Cached — 28 Jun 2026</span>';
  }
  document.getElementById('dataCount').textContent = allStudents.length + ' player' + (allStudents.length!==1?'s':'');
  btn.textContent = 'Refresh'; btn.disabled = false;
  buildFilter(); renderList();
}

async function fetchLive() {
  try {
    const res = await fetch(`https://api.netlify.com/api/v1/forms/${FORM_ID}/submissions?per_page=1000`,
      { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (!res.ok) return null;
    return aggregate(await res.json());
  } catch(e) { return null; }
}

function aggregate(subs) {
  const map = {};
  for (const sub of subs) {
    const d = sub.data || {};
    const key = `${(d.student||'').trim()}||${(d.squad||'').trim()}`;
    if (key.startsWith('||')) continue;
    if (!map[key]) map[key] = { student:{name:(d.student||'').trim(),squad:(d.squad||'').trim()}, logs:{}, lastSeen:sub.created_at };
    const s = map[key];
    if (sub.created_at > s.lastSeen) s.lastSeen = sub.created_at;
    const ex = (d.exercise||'').trim(); if (!ex) continue;
    if (!s.logs[ex]) s.logs[ex] = [];
    const entry = { date: d.date || sub.created_at.slice(0,10) };
    if (d.type==='cardio') { entry.cardio=true; entry.note=d.detail||''; }
    else {
      const sets = (d.detail||'').split(',').map(p=>{ const m=p.trim().match(/^([\d.]+)kg\s*[×x]\s*(\d+)/i); return m?{weight:m[1],reps:m[2]}:null; }).filter(Boolean);
      if (sets.length) entry.sets = sets;
    }
    s.logs[ex].push(entry);
  }
  return Object.values(map).sort((a,b)=>new Date(b.lastSeen)-new Date(a.lastSeen));
}

function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

function buildFilter() {
  const squads = ['all',...new Set(allStudents.map(s=>s.student.squad).filter(Boolean))];
  document.getElementById('squadFilter').innerHTML = squads.map(sq=>
    `<button class="squad-btn${sq===currentSquad?' active':''}" onclick="setSquad('${sq}')">${sq==='all'?'All Squads':sq}</button>`
  ).join('');
}

function setSquad(sq) { currentSquad=sq; buildFilter(); renderList(); }

function renderList() {
  const list = currentSquad==='all' ? allStudents : allStudents.filter(s=>s.student.squad===currentSquad);
  const el = document.getElementById('playerList');
  if (!list.length) { el.innerHTML='<div class="empty">No players found</div>'; return; }
  el.innerHTML = list.map((s,i)=>{
    const exCount = Object.keys(s.logs).length;
    return `<div class="player-card" onclick="openProfile(${i})">
      <div class="p-avatar">${initials(s.student.name)}</div>
      <div>
        <div class="p-name">${s.student.name}</div>
        <div class="p-squad">${s.student.squad||'Unknown squad'}</div>
      </div>
      <div class="p-meta">
        <div class="ex-count">${exCount}</div>
        <div class="ex-label">exercise${exCount!==1?'s':''}</div>
        <div class="p-date">Last: ${fmtDate(s.lastSeen)}</div>
      </div>
      <div class="p-chevron">›</div>
    </div>`;
  }).join('');
}

function openProfile(idx) {
  const list = currentSquad==='all' ? allStudents : allStudents.filter(s=>s.student.squad===currentSquad);
  const s = list[idx];
  const exKeys = Object.keys(s.logs);
  const totalSets = exKeys.reduce((n,ex)=>n+s.logs[ex].reduce((m,e)=>m+(e.sets||[]).length+(e.cardio?1:0),0),0);

  document.getElementById('pAvatar').textContent = initials(s.student.name);
  document.getElementById('pName').textContent   = s.student.name;
  document.getElementById('pSquad').textContent  = s.student.squad || 'Unknown squad';
  document.getElementById('pStats').innerHTML = [
    {num:exKeys.length,lbl:'Exercises'},
    {num:totalSets,lbl:'Total sets'},
    {num:fmtDate(s.lastSeen),lbl:'Last active'}
  ].map(x=>`<div class="stat-item"><div class="stat-num">${x.num}</div><div class="stat-lbl">${x.lbl}</div></div>`).join('');

  document.getElementById('pBody').innerHTML = exKeys.map(ex=>{
    const entries = s.logs[ex];
    const sessionCount = entries.length;
    const allWeights = entries.flatMap(e=>(e.sets||[]).map(s=>parseFloat(s.weight))).filter(w=>w>0);
    const bestWeight = allWeights.length ? Math.max(...allWeights) : null;
    return `<div class="ex-card">
      <div class="ex-card-header">
        <div class="ex-card-name">${ex}</div>
        <div class="ex-card-count">${sessionCount} session${sessionCount!==1?'s':''}${bestWeight?` · Best: ${bestWeight}kg`:''}</div>
      </div>
      <div class="sessions-list">
        ${entries.map(entry=>{
          if (entry.cardio) return `<div class="session-row"><div class="session-date">${entry.date}</div><div class="sets-row"><span class="cardio-chip">🏃 ${entry.note||'Cardio session'}</span></div></div>`;
          const sets = entry.sets||[];
          const topSet = sets.reduce((b,s)=>parseFloat(s.weight)>parseFloat(b.weight)?s:b, sets[0]||{weight:'0',reps:'0'});
          return `<div class="session-row">
            <div class="session-date">${entry.date}</div>
            <div class="sets-row">${sets.map((set,i)=>{
              const isTop = parseFloat(set.weight)===parseFloat(topSet.weight) && set===topSet;
              return `<span class="set-chip">${set.weight}kg<span class="reps">×${set.reps}</span></span>`;
            }).join('')}</div>
            ${sets.length>1&&parseFloat(topSet.weight)>0?`<div class="best-tag">★ Top set: ${topSet.weight}kg × ${topSet.reps}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('listView').style.display = 'none';
  document.getElementById('profileView').style.display = 'block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
