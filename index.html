<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solihull School Rugby Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --maroon:#6B1A2B;--maroon-l:#8B2236;--maroon-d:#4A1020;
  --navy:#0D1B2A;--navy-m:#1A2E45;--navy-l:#243850;
  --gold:#C9A84C;--gold-l:#E8C86A;--white:#F5F1EB;--grey:#8A9BAE;--green:#2D6A4F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Bebas Neue',sans-serif;letter-spacing:0.05em;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--maroon-d) 0%,var(--navy) 60%);padding:28px 20px 20px;text-align:center;border-bottom:1px solid rgba(201,168,76,0.3);}
.school-badge{width:56px;height:56px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-family:'Bebas Neue';font-size:20px;color:var(--navy);}
.header h1{font-size:clamp(26px,6vw,44px);}
.header p{color:var(--gold);font-family:'Barlow Condensed';font-size:13px;letter-spacing:0.15em;text-transform:uppercase;margin-top:3px;}

/* NAV */
.nav{background:var(--maroon-d);display:flex;overflow-x:auto;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
.nav button{flex-shrink:0;background:none;border:none;color:var(--white);font-family:'Barlow Condensed';font-size:13px;font-weight:600;padding:14px 16px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;border-bottom:3px solid transparent;transition:all 0.2s;}
.nav button.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.08);}

/* LAYOUT */
.content{padding:20px;max-width:820px;margin:0 auto;}
.section-title{font-size:30px;color:var(--gold);margin-bottom:4px;}
.section-sub{color:var(--grey);font-size:13px;margin-bottom:20px;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.1em;}

/* PROGRAMME GRID */
.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:500px){.prog-grid{grid-template-columns:1fr;}}
.prog-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.prog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);}
.prog-card.sizeStrength::before{background:#8B2236;}.prog-card.strengthPower::before{background:var(--gold);}.prog-card.power::before{background:#E07B39;}.prog-card.conditioning::before{background:#2D6A4F;}
.prog-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.prog-card h3{font-size:20px;margin-bottom:3px;}
.prog-card p{font-size:12px;color:var(--grey);font-family:'Barlow Condensed';text-transform:uppercase;}
.badge{display:inline-block;margin-top:8px;background:rgba(201,168,76,0.15);color:var(--gold);font-size:11px;padding:3px 8px;border-radius:4px;font-family:'Barlow Condensed';text-transform:uppercase;}

/* PROGRAMME DETAIL */
.block-selector{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.block-btn{background:var(--navy-m);border:1px solid var(--navy-l);color:var(--grey);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed';font-size:13px;font-weight:600;text-transform:uppercase;transition:all 0.2s;}
.block-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.back-btn{background:none;border:1px solid var(--navy-l);color:var(--grey);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed';font-size:13px;margin-bottom:18px;display:inline-flex;align-items:center;gap:5px;transition:all 0.2s;}
.back-btn:hover{color:var(--white);border-color:var(--white);}
.info-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.info-chip{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:6px;padding:7px 12px;font-family:'Barlow Condensed';font-size:12px;}
.info-chip span{color:var(--gold);display:block;font-size:17px;font-family:'Bebas Neue';}
.warmup-box{background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);padding:10px 12px;border-radius:0 6px 6px 0;margin-bottom:14px;font-size:12px;}
.warmup-box strong{color:var(--gold);font-family:'Barlow Condensed';text-transform:uppercase;font-size:10px;letter-spacing:0.08em;display:block;margin-bottom:4px;}
.pap-box{background:rgba(224,123,57,0.1);border-left:3px solid #E07B39;padding:8px 12px;border-radius:0 6px 6px 0;margin-bottom:12px;font-size:11px;color:var(--grey);}
.pap-box strong{color:#E07B39;display:block;margin-bottom:2px;font-family:'Barlow Condensed';text-transform:uppercase;font-size:10px;}

/* SESSION CARD */
.session-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;margin-bottom:14px;overflow:hidden;}
.session-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.session-header h4{font-size:17px;}
.session-header .chevron{color:var(--gold);font-size:18px;}
.session-body{padding:0 16px 16px;}
.session-focus{font-size:11px;color:var(--gold);font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}

/* EXERCISE CARD (replaces table row) */
.ex-card{border:1px solid var(--navy-l);border-radius:6px;margin-bottom:8px;overflow:hidden;background:rgba(13,27,42,0.5);}
.ex-card.ex-open{border-color:rgba(201,168,76,0.4);}
.ex-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:10px 12px;cursor:pointer;}
.ex-main{flex:1;min-width:0;}
.ex-name{font-weight:600;font-size:14px;}
.ex-cue{font-size:11px;color:var(--grey);margin-top:2px;line-height:1.4;}
.ex-meta-row{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.ex-sets-badge{background:rgba(201,168,76,0.12);color:var(--gold);font-family:'Barlow Condensed';font-size:12px;padding:2px 7px;border-radius:3px;}
.ex-rest-badge{color:var(--grey);font-family:'Barlow Condensed';font-size:11px;}
.yt-btn{display:inline-flex;align-items:center;background:#CC0000;color:white;font-size:10px;padding:2px 6px;border-radius:3px;text-decoration:none;font-family:'Barlow Condensed';}
.vid-pending{display:inline-flex;align-items:center;gap:3px;background:rgba(201,168,76,0.12);color:var(--gold);border:1px dashed rgba(201,168,76,0.45);font-size:10px;padding:1px 6px;border-radius:3px;font-family:'Barlow Condensed';text-transform:uppercase;letter-spacing:0.04em;}
.ex-rest-badge.hyp{color:var(--gold);}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ex-last-pill{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:4px;padding:2px 7px;font-family:'Barlow Condensed';font-size:11px;color:var(--gold);white-space:nowrap;}
.log-toggle-btn{background:var(--maroon);border:none;color:white;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed';font-weight:600;text-transform:uppercase;white-space:nowrap;}
.log-toggle-btn:hover{background:var(--maroon-l);}
.log-toggle-btn.active{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}

/* INLINE LOG PANEL */
.log-panel{padding:10px 12px;background:rgba(0,0,0,0.25);border-top:1px solid var(--navy-l);}
.last-session-ref{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.18);border-radius:5px;padding:7px 10px;margin-bottom:10px;}
.last-session-ref .lsr-label{font-family:'Barlow Condensed';font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:4px;}
.last-session-ref .lsr-chips{display:flex;gap:5px;flex-wrap:wrap;}
.lsr-chip{background:var(--navy);border-radius:3px;padding:2px 7px;font-family:'Barlow Condensed';color:var(--gold);font-size:12px;}
.sets-grid-head{display:grid;grid-template-columns:32px 1fr 1fr 28px;gap:5px;margin-bottom:6px;}
.sets-grid-head span{font-family:'Barlow Condensed';font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:0.07em;text-align:center;}
.set-row-inline{display:grid;grid-template-columns:32px 1fr 1fr 28px;gap:5px;align-items:center;margin-bottom:5px;}
.set-num-lbl{font-family:'Barlow Condensed';font-size:12px;color:var(--grey);text-align:center;}
.set-input{width:100%;background:var(--navy);border:1px solid var(--navy-l);color:var(--white);padding:8px 6px;border-radius:4px;font-size:14px;text-align:center;outline:none;font-family:'Barlow';}
.set-input:focus{border-color:var(--gold);}
.set-input::placeholder{color:var(--grey);font-size:11px;}
.set-del-btn{width:26px;height:26px;background:none;border:1px solid rgba(255,255,255,0.08);border-radius:4px;color:var(--grey);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.set-del-btn:hover{border-color:rgba(192,57,43,0.5);color:#f87171;}
.log-panel-actions{display:flex;gap:7px;margin-top:8px;}
.btn-add-set{background:none;border:1px dashed var(--navy-l);color:var(--grey);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed';font-size:12px;transition:all 0.15s;}
.btn-add-set:hover{border-color:var(--gold);color:var(--gold);}
.btn-save-sets{flex:1;background:var(--green);border:none;color:white;padding:8px 16px;border-radius:4px;cursor:pointer;font-family:'Barlow Condensed';font-size:13px;font-weight:700;text-transform:uppercase;}
.btn-save-sets:disabled{opacity:0.35;cursor:default;}
.saved-flash{display:flex;align-items:center;gap:5px;margin-top:7px;padding:6px 10px;background:rgba(45,106,79,0.15);border:1px solid rgba(74,222,128,0.3);border-radius:4px;font-family:'Barlow Condensed';font-size:12px;color:#4ade80;}

/* DASHBOARD */
.dash-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
@media(max-width:480px){.dash-summary{grid-template-columns:1fr 1fr;}}
.dash-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:14px;text-align:center;}
.dash-card .big{font-family:'Bebas Neue';font-size:32px;color:var(--gold);line-height:1;}
.dash-card .lbl{font-family:'Barlow Condensed';font-size:11px;color:var(--grey);text-transform:uppercase;margin-top:3px;}
.lift-section{margin-bottom:24px;}
.lift-section h3{font-size:22px;color:var(--white);margin-bottom:12px;border-bottom:1px solid var(--navy-l);padding-bottom:8px;}
.lift-row{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:14px;margin-bottom:8px;}
.lift-row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.lift-name{font-size:17px;font-family:'Bebas Neue';letter-spacing:0.05em;}
.improvement-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(45,106,79,0.2);border:1px solid rgba(45,106,79,0.4);color:#4ade80;border-radius:4px;padding:2px 7px;font-size:11px;font-family:'Barlow Condensed';margin-top:4px;}
.decline-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:#f87171;border-radius:4px;padding:2px 7px;font-size:11px;font-family:'Barlow Condensed';margin-top:4px;}
.lift-best{text-align:right;}
.lift-best .val{font-family:'Bebas Neue';font-size:28px;color:var(--gold);line-height:1;}
.lift-best .sub{font-size:10px;color:var(--grey);font-family:'Barlow Condensed';text-transform:uppercase;}
.progress-bar-wrap{background:var(--navy);border-radius:4px;height:5px;overflow:hidden;margin-bottom:10px;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--maroon),var(--gold));border-radius:4px;transition:width 0.6s ease;}
/* Bar chart */
.bar-chart-wrap{margin-bottom:10px;}
.bar-chart-label{font-family:'Barlow Condensed';font-size:10px;color:var(--grey);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:44px;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
.bar-fill{width:100%;border-radius:2px 2px 0 0;min-height:4px;}
.bar-fill.pr{background:linear-gradient(0deg,var(--maroon),var(--gold));}
.bar-fill.normal{background:rgba(201,168,76,0.28);}
.bar-date-lbl{font-family:'Barlow Condensed';font-size:9px;color:var(--grey);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.lift-history-row{display:flex;gap:5px;flex-wrap:wrap;}
.lift-hist-chip{background:var(--navy);border-radius:4px;padding:3px 8px;font-size:11px;font-family:'Barlow Condensed';}
.lift-hist-chip .v{color:var(--gold);font-size:13px;display:block;}
.lift-hist-chip .d{color:var(--grey);font-size:10px;}
.no-data{color:var(--grey);font-size:13px;font-style:italic;text-align:center;padding:40px;}

/* NUTRITION */
.tab-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{background:var(--navy-m);border:1px solid var(--navy-l);color:var(--grey);padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'Barlow Condensed';font-size:13px;font-weight:600;text-transform:uppercase;transition:all 0.2s;}
.tab-btn.active{background:var(--maroon);color:var(--white);border-color:var(--maroon-l);}
.pos-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:14px;margin-bottom:10px;}
.pos-card h4{font-size:18px;color:var(--gold);margin-bottom:6px;}
.macro-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.macro-chip{background:var(--navy-l);border-radius:5px;padding:5px 10px;font-size:11px;font-family:'Barlow Condensed';}
.macro-chip span{color:var(--gold);font-size:15px;font-weight:700;display:block;}
.timing-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:14px;margin-bottom:10px;}
.timing-card h4{color:var(--gold);font-size:17px;margin-bottom:7px;}
.timing-card ul{padding-left:16px;font-size:12px;line-height:1.8;}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:480px){.food-grid{grid-template-columns:1fr;}}
.food-card{background:var(--navy-m);border:1px solid var(--navy-l);border-radius:8px;padding:12px;}
.food-card h4{font-size:14px;margin-bottom:4px;color:var(--gold);}
.food-card p{font-size:11px;color:var(--grey);line-height:1.5;}
.star{color:var(--gold);}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,var(--maroon-d) 0%,var(--navy) 55%);}
.login-card{width:100%;max-width:400px;background:var(--navy-m);border:1px solid var(--navy-l);
  border-radius:14px;padding:32px 24px;box-shadow:0 24px 60px rgba(0,0,0,.5);}
.login-card .school-badge{width:64px;height:64px;font-size:24px;margin:0 auto 14px;}
.login-card h2{font-size:30px;text-align:center;margin-bottom:2px;}
.login-card .login-sub{text-align:center;color:var(--gold);font-family:'Barlow Condensed';
  font-size:12px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-family:'Barlow Condensed';font-size:11px;color:var(--grey);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.login-field input,.login-field select{width:100%;padding:13px 14px;border-radius:8px;
  border:1px solid var(--navy-l);background:#0D1B2A;color:var(--white);font-size:16px;
  font-family:'Barlow',sans-serif;outline:none;transition:border-color .15s;}
.login-field input:focus,.login-field select:focus{border-color:var(--gold);}
.login-field select option{background:var(--navy);}
.login-btn{width:100%;margin-top:20px;padding:14px;border:none;border-radius:8px;cursor:pointer;
  background:linear-gradient(180deg,var(--maroon-l),var(--maroon-d));color:var(--white);
  font-family:'Bebas Neue';font-size:20px;letter-spacing:.08em;transition:opacity .15s;}
.login-btn:hover{opacity:.9;}
.login-hint{text-align:center;font-family:'Barlow Condensed';font-size:11px;color:var(--grey);margin-top:14px;}

/* HEADER USER CHIP */
.header-user{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.header-user .user-chip{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);
  border-radius:20px;padding:4px 12px;font-family:'Barlow Condensed';font-size:12px;color:var(--gold);}
.header-user .signout-btn{background:none;border:none;color:var(--grey);font-family:'Barlow Condensed';
  font-size:11px;cursor:pointer;text-decoration:underline;text-transform:uppercase;letter-spacing:.06em;}
.header-user .signout-btn:hover{color:var(--white);}
</style>
</head>
<body>
<!-- Hidden form so Netlify detects it on deploy. Every saved set is POSTed here,
     giving coaches a central record under Netlify dashboard → Forms → training-log. -->
<form name="training-log" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="student"/>
  <input type="text" name="squad"/>
  <input type="text" name="exercise"/>
  <input type="text" name="date"/>
  <input type="text" name="type"/>
  <input type="text" name="detail"/>
</form>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const KEY_LIFTS = ['Back Squat','Bench Press','Deadlift','Overhead Press','Pull-Up (weighted)','Romanian Deadlift','Trap Bar Deadlift','Push Press'];

// Exercises still awaiting a demo video — shown with a "Video coming soon" marker.
// Matched as a substring of the exercise name so every block/variant is covered.
const VIDEO_PENDING = [
  'dead bug','pallof press','ab wheel','deficit deadlift','ghd back extension',
  'copenhagen plank','dragon flag','farmer carry','landmine 180','band lat pulldown',
  'hollow body hold','lateral bound to sprint','landmine anti-rotation','5-10-5'
];
function needsVideo(name){
  const n = (name||'').toLowerCase();
  // 5-10-5 needs digit boundaries so "Irish Shuttle (5-10-15-...-10-5m)" isn't matched.
  if(/(^|[^\d])5-10-5([^\d]|$)/.test(n)) return true;
  return VIDEO_PENDING.some(k => k !== '5-10-5' && n.includes(k));
}

// Hypertrophy rule: anything in the 8–10 rep range gets 60 seconds max recovery.
function displayRest(ex){
  if(ex.cardio) return ex.rest;
  const repNum = parseInt(String(ex.reps), 10);
  if(!(repNum >= 8 && repNum <= 10)) return ex.rest;
  const r = String(ex.rest || '').toLowerCase();
  const min = r.match(/([\d.]+)\s*min/);
  const sec = r.match(/([\d.]+)\s*s/);
  let secs = min ? parseFloat(min[1]) * 60 : (sec ? parseFloat(sec[1]) : null);
  return (secs != null && secs > 60) ? '60s' : ex.rest;
}

const PROGRAMMES = {
  sizeStrength: {
    id:'sizeStrength', name:'Size & Strength', subtitle:'Off-Season Mass Builder', color:'#8B2236', badge:'Off-Season',
    info:{sessions:'3 / week',duration:'75 min',focus:'Hypertrophy + Strength base'},
    blocks:[
      { name:'Block 1', subtitle:'Foundation — Weeks 1-4',
        warmup:'5 min rower easy → 2 rounds: 10 banded pull-aparts, 10 hip circles each side, 10 BW squats, 10 shoulder circles',
        sessions:[
          { name:'Session A', focus:'Lower Body — Squat + Posterior Chain', exercises:[
            {name:'Back Squat',sets:'4',reps:'8',rest:'2 min',cue:'Brace hard, knees track toes, full depth',yt:'https://youtu.be/ultWZbUMPL8'},
            {name:'Romanian Deadlift',sets:'3',reps:'10',rest:'90s',cue:'Push hips back, feel hamstring stretch',yt:'https://youtu.be/JCXUYuzwNrM'},
            {name:'Leg Press',sets:'3',reps:'12',rest:'90s',cue:'Full range, feet shoulder-width'},
            {name:'Nordic Hamstring Curl',sets:'3',reps:'6',rest:'2 min',cue:'Control the descent — injury prevention'},
            {name:'Banded Hip Thrust',sets:'3',reps:'15',rest:'60s',cue:'Drive through heels, squeeze glutes at top'},
            {name:'Core: Dead Bug',sets:'3',reps:'10 each',rest:'45s',cue:'Lower back stays flat throughout'},

// ── EXERCISE CARD WITH INLINE LOGGING ────────────────────────────────────────
function ExerciseCard({ ex, logs, onLog }) {
  const isCardio = !!ex.cardio;
  const exLogs = logs[ex.name] || [];
  const lastLog = exLogs[exLogs.length - 1];
  const lastTopSet = (!isCardio && lastLog && lastLog.sets)
    ? lastLog.sets.reduce((a,b)=>(parseFloat(b.weight)||0)>(parseFloat(a.weight)||0)?b:a, lastLog.sets[0])
    : null;

  const initSets = () => Array(parseInt(ex.sets)||3).fill(null).map(()=>({w:'',r:''}));
  const [open,  setOpen]  = useState(false);
  const [sets,  setSets]  = useState(initSets);
  const [note,  setNote]  = useState('');
  const [saved, setSaved] = useState(false);

  const toggle = () => { setOpen(o=>!o); setSaved(false); };
  const update = (i,f,v) => setSets(s=>s.map((x,j)=>j===i?{...x,[f]:v}:x));
  const addSet = () => setSets(s=>[...s,{w:'',r:''}]);
  const delSet = (i) => { if(sets.length>1) setSets(s=>s.filter((_,j)=>j!==i)); };

  const canSave = isCardio ? note.trim().length>0 : sets.some(s=>s.w||s.r);

  const doSave = () => {
    if(!canSave) return;
    const date = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
    if(isCardio) {
      onLog({ exercise:ex.name, date, cardio:true, note:note.trim() });
      setNote('');
    } else {
      const valid = sets.filter(s=>s.w||s.r);
      onLog({ exercise:ex.name, date, sets:valid.map(s=>({weight:s.w,reps:s.r})) });
      setSets(initSets());
    }
    setSaved(true);
    setTimeout(()=>{ setSaved(false); setOpen(false); }, 1500);
  };

  return (
    <div className={`ex-card ${open?'ex-open':''}`}>
      <div className="ex-header" onClick={toggle}>
        <div className="ex-main">
          <div className="ex-name">{ex.name}</div>
          {ex.cue && <div className="ex-cue">{ex.cue}</div>}
          <div className="ex-meta-row">
            <span className="ex-sets-badge">{ex.sets}×{ex.reps}</span>
            {(() => { const rest = displayRest(ex); const capped = rest !== ex.rest;
              return rest && rest!=='—' && <span className={`ex-rest-badge ${capped?'hyp':''}`}>Rest: {rest}</span>; })()}
            {ex.yt && <a href={ex.yt} target="_blank" rel="noopener" className="yt-btn" onClick={e=>e.stopPropagation()}>▶ Demo</a>}
            {!ex.yt && needsVideo(ex.name) && <span className="vid-pending">🎥 Video coming soon</span>}
          </div>
        </div>
        <div className="ex-right">
          {!isCardio && lastTopSet && lastTopSet.weight && (
            <span className="ex-last-pill">{lastTopSet.weight}kg</span>
          )}
          {isCardio && lastLog && lastLog.note && (
            <span className="ex-last-pill" style={{maxWidth:90,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{lastLog.note}</span>
          )}
          <button className={`log-toggle-btn ${open?'active':''}`} onClick={e=>{e.stopPropagation();toggle();}}>
            {open?'Close':'+ Log'}
          </button>
        </div>
      </div>

      {open && (
        <div className="log-panel">
          {/* Last session reference */}
          {lastLog && !isCardio && lastLog.sets && (
            <div className="last-session-ref">
              <span className="lsr-label">Last logged · {lastLog.date}</span>
              <div className="lsr-chips">
                {lastLog.sets.map((s,i)=>(
                  <span key={i} className="lsr-chip">
                    {s.weight?s.weight+'kg':''}{s.weight&&s.reps?' × ':''}{s.reps?s.reps+'r':''}
                  </span>
                ))}
              </div>
            </div>
          )}
          {lastLog && isCardio && lastLog.note && (
            <div className="last-session-ref">
              <span className="lsr-label">Last logged · {lastLog.date}</span>
              <span style={{fontSize:12,color:'var(--white)'}}>{lastLog.note}</span>
            </div>
          )}

          {/* Cardio log: just a notes/time field */}
          {isCardio ? (
            <div>
              <div style={{marginBottom:6}}>
                <span style={{fontFamily:'Barlow Condensed',fontSize:10,color:'var(--grey)',textTransform:'uppercase',letterSpacing:'0.08em'}}>
                  Log time / pace / rounds completed
                </span>
              </div>
              <input
                className="set-input" type="text"
                placeholder={`e.g. "${ex.sets} rounds done, pace 2:10/500m, 8/10 effort"`}
                value={note}
                onChange={e=>setNote(e.target.value)}
                style={{width:'100%',textAlign:'left',fontSize:13,padding:'9px 10px'}}
              />
            </div>
          ) : (
            <>
              <div className="sets-grid-head">
                <span></span><span>kg</span><span>Reps</span><span></span>
              </div>
              {sets.map((s,i)=>(
                <div key={i} className="set-row-inline">
                  <span className="set-num-lbl">S{i+1}</span>
                  <input className="set-input" type="number" inputMode="decimal"
                    placeholder={lastTopSet?.weight||'kg'} value={s.w}
                    onChange={e=>update(i,'w',e.target.value)}/>
                  <input className="set-input" type="number" inputMode="numeric"
                    placeholder={lastTopSet?.reps||'reps'} value={s.r}
                    onChange={e=>update(i,'r',e.target.value)}/>
                  <button className="set-del-btn" onClick={()=>delSet(i)}>×</button>
                </div>
              ))}
            </>
          )}

          <div className="log-panel-actions">
            {!isCardio && <button className="btn-add-set" onClick={addSet}>+ Set</button>}
            <button className="btn-save-sets" disabled={!canSave} onClick={doSave}>Save</button>
          </div>
          {saved && <div className="saved-flash">✓ Logged for {ex.name}</div>}
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function DashboardTab({ logs }) {
  const allExercises = {};
  Object.entries(logs).forEach(([n,entries])=>{ if(entries&&entries.length>0) allExercises[n]=entries; });

  const totalSessions = new Set(Object.values(allExercises).flat().map(e=>e.date)).size;
  const totalSets = Object.values(allExercises).flat().reduce((a,e)=>a+(e.sets?.length||0),0);
  const totalExercises = Object.keys(allExercises).length;

  const isCardioEntry = (e) => e.cardio === true || !e.sets;

  function getBest(entries) {
    let b=null;
    entries.filter(e=>!isCardioEntry(e)).forEach(e=>(e.sets||[]).forEach(s=>{
      const w=parseFloat(s.weight)||0,r=parseFloat(s.reps)||0;
      if(!b||w>b.weight||(w===b.weight&&r>b.reps)) b={weight:w,reps:r,date:e.date};
    }));
    return b;
  }

  function getImprovement(entries) {
    const strengthEntries = entries.filter(e=>!isCardioEntry(e));
    if(strengthEntries.length<2) return null;
    const f=strengthEntries[0].sets?.find(s=>s.weight);
    const l=strengthEntries[strengthEntries.length-1].sets?.find(s=>s.weight);
    if(!f||!l) return null;
    return +(parseFloat(l.weight)-parseFloat(f.weight)).toFixed(1);
  }

  function maxPerSession(entries) {
    return entries.filter(e=>!isCardioEntry(e)).map(e=>{
      const top=(e.sets||[]).reduce((a,b)=>(parseFloat(b.weight)||0)>(parseFloat(a.weight)||0)?b:a,e.sets?.[0]||{weight:'0'});
      return {date:e.date,weight:parseFloat(top.weight)||0,reps:top.reps};
    });
  }

  const keyLiftsLogged = KEY_LIFTS.filter(k=>allExercises[k]);
  const otherLifts = Object.keys(allExercises).filter(k=>!KEY_LIFTS.includes(k));

  if(keyLiftsLogged.length===0 && otherLifts.length===0) {
    return (
      <div>
        <h2 className="section-title">Progress Dashboard</h2>
        <p className="section-sub">Your performance over time</p>
        <div className="no-data">No sessions logged yet.<br/>Open any programme, expand a session, tap <strong style={{color:'var(--gold)'}}>+ Log</strong> on an exercise.</div>
      </div>
    );
  }

  const maxW = Math.max(...Object.values(allExercises).flat().flatMap(e=>(e.sets||[]).map(s=>parseFloat(s.weight)||0)),1);

  function renderLift(name) {
    const entries = allExercises[name];
    const best = getBest(entries);
    const imp = getImprovement(entries);
    const pts = maxPerSession(entries);
    const localMax = Math.max(...pts.map(p=>p.weight),1);
    const barWidth = best&&best.weight>0 ? Math.min(100,(best.weight/maxW)*100) : 0;
    return (
      <div key={name} className="lift-row">
        <div className="lift-row-top">
          <div>
            <div className="lift-name">{name}</div>
            {imp!==null&&(
              imp>=0
                ? <span className="improvement-badge">↑ +{imp}kg from first session</span>
                : <span className="decline-badge">↓ {imp}kg from first session</span>
            )}
          </div>
          {best&&(
            <div className="lift-best">
              <div className="val">{best.weight>0?best.weight+'kg':best.reps+'r'}</div>
              <div className="sub">{best.weight>0?`× ${best.reps} reps`:'best set'} · PR</div>
            </div>
          )}
        </div>
        {best&&best.weight>0&&(
          <div className="progress-bar-wrap">
            <div className="progress-bar" style={{width:`${barWidth}%`}}/>
          </div>
        )}
        {pts.length>1&&pts.some(p=>p.weight>0)&&(
          <div className="bar-chart-wrap">
            <div className="bar-chart-label">Weight per session</div>
            <div className="bar-chart">
              {pts.map((p,i)=>{
                const isPR = p.weight===localMax&&p.weight>0;
                const h = p.weight>0 ? Math.max(10,(p.weight/localMax)*100) : 5;
                return (
                  <div key={i} className="bar-col" title={`${p.date}: ${p.weight}kg${p.reps?' × '+p.reps+'r':''}`}>
                    <div className={`bar-fill ${isPR?'pr':'normal'}`} style={{height:h+'%'}}/>
                    <span className="bar-date-lbl">{p.date.split(' ').slice(0,2).join(' ')}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div className="lift-history-row">
          {entries.map((e,i)=>{
            if(isCardioEntry(e)) return (
              <div key={i} className="lift-hist-chip">
                <span className="v" style={{fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{e.note||'Done'}</span>
                <span className="d">{e.date}</span>
              </div>
            );
            const top=e.sets?.reduce((a,b)=>(parseFloat(b.weight)||0)>(parseFloat(a.weight)||0)?b:a,e.sets[0]);
            return top?(
              <div key={i} className="lift-hist-chip">
                <span className="v">{top.weight?top.weight+'kg':''}{top.weight&&top.reps?' × ':''}{top.reps?top.reps+'r':''}</span>
                <span className="d">{e.date}</span>
              </div>
            ):null;
          })}
        </div>
      </div>
    );
  }

  return (
    <div>
      <h2 className="section-title">Progress Dashboard</h2>
      <p className="section-sub">Your performance over time</p>
      <div className="dash-summary">
        <div className="dash-card"><div className="big">{totalSessions}</div><div className="lbl">Days Logged</div></div>
        <div className="dash-card"><div className="big">{totalSets}</div><div className="lbl">Total Sets</div></div>
        <div className="dash-card"><div className="big">{totalExercises}</div><div className="lbl">Exercises</div></div>
      </div>
      {keyLiftsLogged.length>0&&(
        <div className="lift-section">
          <h3>Key Lifts</h3>
          {keyLiftsLogged.map(renderLift)}
        </div>
      )}
      {otherLifts.length>0&&(
        <div className="lift-section">
          <h3>All Exercises</h3>
          {otherLifts.map(renderLift)}
        </div>
      )}
    </div>
  );
}

// ── NUTRITION ─────────────────────────────────────────────────────────────────
function NutritionTab() {
  const [tab,setTab]=useState('position');
  return (
    <div>
      <h2 className="section-title">Nutrition</h2>
      <p className="section-sub">Fuel for rugby performance</p>
      <div className="tab-row">
        {['position','timing','foods'].map(t=>(
          <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>
      {tab==='position'&&(
        <div>
          <p style={{fontSize:'12px',color:'var(--grey)',marginBottom:'14px'}}>Research from ISSN and World Rugby shows 90%+ of rugby players under-fuel on carbs. Targets for 75-85kg players — adjust by bodyweight.</p>
          {POSITIONS.map((p,i)=>(
            <div key={i} className="pos-card">
              <h4>{p.pos}</h4>
              <p style={{fontSize:'11px',color:'var(--grey)'}}>{p.notes}</p>
              <div className="macro-row">
                <div className="macro-chip"><span>{p.kcal}</span>kcal/day</div>
                <div className="macro-chip"><span>{p.carbs}</span>Carbs</div>
                <div className="macro-chip"><span>{p.protein}</span>Protein</div>
                <div className="macro-chip"><span>{p.fat}</span>Fat</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {tab==='timing'&&(
        <div>
          <p style={{fontSize:'12px',color:'var(--grey)',marginBottom:'14px'}}>When you eat matters as much as what you eat.</p>
          {TIMING.map((t,i)=>(
            <div key={i} className="timing-card">
              <h4>{t.phase}</h4>
              <ul>{t.items.map((item,j)=><li key={j}>{item}</li>)}</ul>
            </div>
          ))}
        </div>
      )}
      {tab==='foods'&&(
        <div>
          <p style={{fontSize:'12px',color:'var(--grey)',marginBottom:'14px'}}>Rated by evidence, not trends.</p>
          <div className="food-grid">
            {FOODS.map((f,i)=>(
              <div key={i} className="food-card">
                <h4>{f.name} <span className="star">{'★'.repeat(f.r)}</span></h4>
                <p>{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
const SQUADS = ['1st XV','2nd XV','U18A','U18B','U16A','U16B','U15','U14','Development'];

function LoginScreen({ onLogin }) {
  const [name, setName] = React.useState('');
  const [squad, setSquad] = React.useState(SQUADS[0]);
  const submit = (e) => {
    e.preventDefault();
    const n = name.trim();
    if (!n) return;
    onLogin({ name: n, squad });
  };
  return (
    <div className="login-screen">
      <form className="login-card" onSubmit={submit} autoComplete="on">
        <div className="school-badge">S</div>
        <h2>SOLIHULL SCHOOL</h2>
        <p className="login-sub">Rugby Performance Programme</p>
        <div className="login-field">
          <label htmlFor="login-name">Your name</label>
          <input id="login-name" name="name" type="text" placeholder="e.g. Tom Harper"
            value={name} onChange={e=>setName(e.target.value)} autoComplete="given-name" required/>
        </div>
        <div className="login-field">
          <label htmlFor="login-squad">Squad</label>
          <select id="login-squad" name="squad" value={squad} onChange={e=>setSquad(e.target.value)}>
            {SQUADS.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <button className="login-btn" type="submit">Start Training →</button>
        <p className="login-hint">Remembered on this device — no password needed.</p>
      </form>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('training');
  const [user, setUser] = useLocalStorage('solihull-user-v1', null);
  const [logs, setLogs] = useLocalStorage('solihull-logs-v2', {});

  const handleLogin = useCallback((u) => setUser(u), [setUser]);
  const handleSignOut = useCallback(() => { if(window.confirm('Sign out? Your progress stays saved on this device.')) setUser(null); }, [setUser]);

  const handleLog = useCallback((entry) => {
    // Save to device (always works offline)
    setLogs(prev => {
      const newEntry = { date: entry.date };
      if (entry.sets) newEntry.sets = entry.sets;
      if (entry.cardio) { newEntry.cardio = true; if (entry.note) newEntry.note = entry.note; }
      return { ...prev, [entry.exercise]: [...(prev[entry.exercise]||[]), newEntry] };
    });
    // Send to the central coach record via Netlify Forms (no backend/build needed).
    // Best-effort: device storage above is always the source of truth.
    if (user) {
      const detail = entry.cardio
        ? (entry.note || 'completed')
        : (entry.sets || []).map(s => `${s.weight||'?'}kg × ${s.reps||'?'}`).join(', ');
      const body = new URLSearchParams({
        'form-name': 'training-log',
        student: user.name || '',
        squad: user.squad || '',
        exercise: entry.exercise,
        date: entry.date,
        type: entry.cardio ? 'cardio' : 'strength',
        detail,
      });
      fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      }).catch(() => {});
    }
  }, [setLogs, user]);

  if (!user) return <LoginScreen onLogin={handleLogin}/>;

  return (
    <div>
      <div className="header">
        <div className="school-badge">S</div>
        <h1>SOLIHULL SCHOOL</h1>
        <p>Rugby Performance Programme</p>
        <div className="header-user">
          <span className="user-chip">👤 {user.name} · {user.squad}</span>
          <button className="signout-btn" onClick={handleSignOut}>Sign out</button>
        </div>
      </div>
      <nav className="nav">
        {[{id:'training',label:'Training'},{id:'dashboard',label:'Dashboard'},{id:'nutrition',label:'Nutrition'}].map(t=>(
          <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </nav>
      <div className="content">
        {tab==='training'&&<TrainingTab logs={logs} onLog={handleLog}/>}
        {tab==='dashboard'&&<DashboardTab logs={logs}/>}
        {tab==='nutrition'&&<NutritionTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
